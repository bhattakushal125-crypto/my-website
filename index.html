<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kushal's website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: #020617;
    }

    header h1 {
      color: #38bdf8;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #38bdf8;
    }

    .hero {
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
    }

    .hero h2 {
      font-size: 40px;
    }

    .hero p {
      margin: 15px 0;
      color: #94a3b8;
    }

    .btn {
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      color: black;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    .section {
      padding: 50px;
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #020617;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <h1>Kushal world</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <div class="hero">
    <h2>Build Something Amazing 🚀</h2>
    <p>Start your journey in web development today</p>
    <button class="btn">Get Started</button>
  </div>

  <!-- Services -->
  <div class="section">
    <h2>My Services</h2>
    <div class="cards">
      <div class="card">
        <h3>Web Design</h3>
        <p>Modern and clean designs</p>
      </div>
      <div class="card">
        <h3>Development</h3>
        <p>Fast and responsive websites</p>
      </div>
      <div class="card">
        <h3>Support</h3>
        <p>24/7 help and updates</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2026 MySite | All Rights Reserved</p>
  </footer>

</body>
</html>
